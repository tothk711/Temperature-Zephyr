<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Comparison</title>
    <!-- Pinned to known-good versions. Do NOT change to unversioned "latest"
         URLs: an upstream major release could silently break the charts. -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #4ecca3;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        header .today-date {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .top-controls {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .refresh-btn {
            padding: 10px 20px;
            font-size: 0.9rem;
            border: none;
            border-radius: 8px;
            background: #4ecca3;
            color: #1a1a2e;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #7ff5c9;
        }

        .refresh-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .graphs-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 1000px) {
            .graphs-container {
                grid-template-columns: 1fr;
            }
        }

        .chart-panel {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .chart-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .chart-header label {
            color: #aaa;
            font-size: 0.9rem;
        }

        .chart-header select {
            padding: 8px 16px;
            font-size: 0.95rem;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: #eee;
            cursor: pointer;
            outline: none;
        }

        .chart-header select:hover {
            background: #1a4a7a;
        }

        .chart-wrapper {
            position: relative;
            height: 350px;
        }

        .legend-custom {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            cursor: pointer;
            user-select: none;
            padding: 2px 6px;
            border-radius: 6px;
            transition: background 0.15s, opacity 0.15s;
        }

        .legend-item:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        /* A hidden series: dim it and strike through the label so it is clear
           the line was toggled off (click again to bring it back). */
        .legend-item.legend-hidden {
            opacity: 0.4;
        }

        .legend-item.legend-hidden span {
            text-decoration: line-through;
        }

        .legend-line {
            width: 25px;
            height: 0;
            border-bottom-width: 3px;
            border-bottom-style: solid;
        }

        .legend-line.past-avg {
            border-color: rgba(255, 200, 200, 0.5);
            border-bottom-width: 2px;
        }

        .legend-line.dotted-light-red {
            border-color: #ff9999;
            border-bottom-style: dotted;
        }

        .legend-line.dashed-red {
            border-color: #e94560;
            border-bottom-style: dashed;
        }

        .legend-line.solid-green {
            border-color: #4ecca3;
            border-bottom-width: 5px;
        }

        .legend-line.dashed-cyan {
            border-color: #00CED1;
            border-bottom-style: dashed;
        }

        .legend-line.dashed-light-green {
            border-color: #90EE90;
            border-bottom-style: dashed;
        }

        .legend-line.dotted-light-green {
            border-color: #90EE90;
            border-bottom-style: dotted;
            border-bottom-width: 2px;
        }

        .status-bar {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.8rem;
        }

        .timezone-note {
            text-align: center;
            margin-top: 8px;
            color: #888;
            font-size: 0.75rem;
            font-style: italic;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #e94560;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 12px;
        }

        @media (max-width: 600px) {
            .chart-panel {
                padding: 15px;
            }
            
            header h1 {
                font-size: 1.5rem;
            }

            .legend-custom {
                gap: 6px;
            }

            .legend-item {
                font-size: 0.65rem;
            }

            .chart-wrapper {
                height: 300px;
            }
        }

        /* View tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 22px;
            font-size: 0.95rem;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: #cfd8e3;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s, color 0.2s;
        }

        .tab-btn:hover { background: #1a4a7a; }
        .tab-btn.active { background: #4ecca3; color: #1a1a2e; }

        /* Verification badge */
        .verify-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid transparent;
            user-select: none;
        }

        .verify-badge.checking { background: rgba(150,150,150,0.15); color: #aaa; border-color: rgba(150,150,150,0.3); }
        .verify-badge.ok { background: rgba(78,204,163,0.15); color: #4ecca3; border-color: rgba(78,204,163,0.4); }
        .verify-badge.warning { background: rgba(233,180,76,0.15); color: #e9b44c; border-color: rgba(233,180,76,0.45); }
        .verify-badge.error { background: rgba(150,150,150,0.12); color: #999; border-color: rgba(150,150,150,0.25); }

        .verify-details {
            margin-top: 10px;
            font-size: 0.72rem;
            color: #9fb0c3;
            line-height: 1.5;
            text-align: left;
            display: none;
        }

        .verify-details.show { display: block; }
        .verify-details .vd-pass { color: #4ecca3; }
        .verify-details .vd-fail { color: #e9b44c; }
        .verify-details .vd-skip { color: #888; }

        /* Data table */
        .table-panel {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 1100px;
            margin: 0 auto;
        }

        .table-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .table-controls label { color: #aaa; font-size: 0.9rem; }

        .table-controls select {
            padding: 8px 16px;
            font-size: 0.95rem;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: #eee;
            cursor: pointer;
            outline: none;
        }

        .table-scroll { overflow-x: auto; }

        table.data-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 0.85rem;
            min-width: 640px;
        }

        table.data-table caption {
            text-align: left;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 12px;
        }

        table.data-table th,
        table.data-table td {
            padding: 8px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        table.data-table thead th {
            color: #4ecca3;
            font-weight: 600;
            border-bottom: 2px solid rgba(78, 204, 163, 0.3);
        }

        table.data-table th.time-col,
        table.data-table td.time-col {
            text-align: left;
            color: #cfd8e3;
            font-weight: 600;
            position: sticky;
            left: 0;
            background: #16213e;
        }

        table.data-table td.today-col { color: #4ecca3; font-weight: 600; }
        table.data-table tbody tr:hover td { background: rgba(255, 255, 255, 0.03); }
        table.data-table td.na { color: #555; }

        /* Preparation (CZ / HU) table */
        table.prep-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 0.9rem;
            min-width: 720px;
        }

        table.prep-table caption {
            text-align: left;
            color: #fff;
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 12px;
        }

        table.prep-table th,
        table.prep-table td {
            padding: 9px 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        table.prep-table thead th {
            color: #4ecca3;
            font-weight: 700;
            background: rgba(15, 52, 96, 0.5);
        }

        table.prep-table thead th .col-date {
            display: block;
            font-weight: 400;
            color: #8fa3b8;
            font-size: 0.72rem;
        }

        table.prep-table thead th .col-day {
            display: block;
            font-weight: 600;
            color: #7fd8bd;
            font-size: 0.72rem;
        }

        table.prep-table th.row-label {
            text-align: left;
            color: #cfd8e3;
            font-weight: 600;
            background: #16213e;
            white-space: nowrap;
            cursor: help;
            text-decoration: underline dotted rgba(255, 255, 255, 0.28);
            text-underline-offset: 3px;
        }

        table.prep-table td.prep-note {
            text-align: left;
            font-size: 0.78rem;
            color: #e6c98a;
            line-height: 1.35;
        }

        table.prep-table td.blank { color: #4a5568; }

        /* Day-over-day swing colours (toward / away from higher solar FVE output) */
        .swing-vg { background: rgba(46, 204, 113, 0.55); color: #06231a; font-weight: 700; }
        .swing-g  { background: rgba(46, 204, 113, 0.26); }
        .swing-r  { background: rgba(231, 76, 60, 0.30); }
        .swing-dr { background: rgba(192, 57, 43, 0.66); color: #fff; font-weight: 700; }

        .prep-legend {
            margin-top: 16px;
            font-size: 0.76rem;
            color: #9fb0c3;
            line-height: 1.6;
            text-align: left;
        }

        .prep-legend .swatch {
            display: inline-block;
            width: 14px; height: 14px;
            border-radius: 3px;
            vertical-align: middle;
            margin: 0 4px 0 10px;
        }

        .prep-legend .note { margin-top: 6px; color: #7f8ea3; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌡️ Weather Comparison</h1>
            <div class="today-date" id="todayDate">Loading...</div>
        </header>

        <div class="top-controls">
            <button class="refresh-btn" onclick="refreshData()">🔄 Refresh All Data</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tabGraphs" onclick="showTab('graphs')">📊 Graphs</button>
            <button class="tab-btn" id="tabTable" onclick="showTab('table')">📋 Table</button>
            <button class="tab-btn" id="tabCzPrep" onclick="showTab('czprep')">CZ future</button>
            <button class="tab-btn" id="tabHuPrep" onclick="showTab('huprep')">HU future</button>
        </div>

      <div id="graphsView">
        <div class="graphs-container">
            <!-- Left Graph - Czech Cities -->
            <div class="chart-panel">
                <div class="chart-header">
                    <label for="leftCitySelect">City:</label>
                    <select id="leftCitySelect"></select>
                    <span class="verify-badge checking" id="leftVerify" onclick="toggleDetails('left')">⏳ Checking…</span>
                </div>
                <div class="verify-details" id="leftVerifyDetails"></div>
                <div class="chart-wrapper">
                    <canvas id="leftChart"></canvas>
                </div>
                <div class="legend-custom">
                    <div class="legend-item">
                        <div class="legend-line past-avg"></div>
                        <span>Past Avg (3-7d)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-line dotted-light-red"></div>
                        <span>2 Days Ago</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-line dashed-red"></div>
                        <span>Yesterday</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-line solid-green"></div>
                        <span>Today</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-line dashed-cyan"></div>
                        <span>Today Forecast</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-line dashed-light-green"></div>
                        <span>Tomorrow</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-line dotted-light-green"></div>
                        <span>Day After</span>
                    </div>
                </div>
            </div>

            <!-- Right Graph - Other Cities -->
            <div class="chart-panel">
                <div class="chart-header">
                    <label for="rightCitySelect">City:</label>
                    <select id="rightCitySelect"></select>
                    <span class="verify-badge checking" id="rightVerify" onclick="toggleDetails('right')">⏳ Checking…</span>
                </div>
                <div class="verify-details" id="rightVerifyDetails"></div>
                <div class="chart-wrapper">
                    <canvas id="rightChart"></canvas>
                </div>
                <div class="legend-custom">
                    <div class="legend-item">
                        <div class="legend-line past-avg"></div>
                        <span>Past Avg (3-7d)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-line dotted-light-red"></div>
                        <span>2 Days Ago</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-line dashed-red"></div>
                        <span>Yesterday</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-line solid-green"></div>
                        <span>Today</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-line dashed-cyan"></div>
                        <span>Today Forecast</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-line dashed-light-green"></div>
                        <span>Tomorrow</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-line dotted-light-green"></div>
                        <span>Day After</span>
                    </div>
                </div>
            </div>
        </div>
      </div><!-- /graphsView -->

      <div id="tableView" style="display:none;">
        <div class="table-panel">
            <div class="table-controls">
                <label for="tableCitySelect">City:</label>
                <select id="tableCitySelect"></select>
                <span class="verify-badge checking" id="tableVerify" onclick="toggleDetails('table')">⏳ Checking…</span>
            </div>
            <div class="verify-details" id="tableVerifyDetails"></div>
            <div class="table-scroll">
                <div id="tableContainer"></div>
            </div>
        </div>
      </div><!-- /tableView -->

      <div id="czPrepView" style="display:none;">
        <div class="table-panel">
            <div class="table-scroll">
                <div id="czPrepContainer"></div>
            </div>
            <div class="prep-legend" id="czPrepLegend"></div>
        </div>
      </div><!-- /czPrepView -->

      <div id="huPrepView" style="display:none;">
        <div class="table-panel">
            <div class="table-scroll">
                <div id="huPrepContainer"></div>
            </div>
            <div class="prep-legend" id="huPrepLegend"></div>
        </div>
      </div><!-- /huPrepView -->

        <div class="status-bar" id="statusBar">
            Loading...
        </div>
        <div class="timezone-note">
            All times are in Central European Time (CET/CEST)
        </div>
    </div>

    <script>
        // City groups
        const czechCities = ['Czechia', 'Prague', 'Brno', 'Plzen', 'Ostrava'];
        const czechCitiesForAverage = ['Prague', 'Brno', 'Plzen', 'Ostrava'];
        const otherCities = ['Budapest', 'Debrecen', 'Berlin', 'Munich'];

        // Charts
        let leftChart = null;
        let rightChart = null;

        // Current selections
        let leftCity = 'Czechia';
        let rightCity = 'Budapest';

        // Cache for city data (for calculating Czechia average)
        let cityDataCache = {};

        // Initialize
        async function init() {
            updateTodayDate();
            setupDropdowns();
            setupTable();
            setupLegends();
            await Promise.all([
                loadWeatherData('left', leftCity),
                loadWeatherData('right', rightCity)
            ]);
        }

        // Update today's date in header.
        // The server does all of its day math in Europe/Prague (see APP_TIMEZONE
        // in server.js). Deriving the header date from the browser's local zone
        // or from UTC could disagree with the server around midnight and show the
        // wrong day, so compute both the weekday and the date in Europe/Prague.
        function updateTodayDate() {
            const now = new Date();
            const dateStr = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'Europe/Prague',
                year: 'numeric', month: '2-digit', day: '2-digit'
            }).format(now); // YYYY-MM-DD
            const dayName = new Intl.DateTimeFormat('en-US', {
                timeZone: 'Europe/Prague', weekday: 'long'
            }).format(now);
            document.getElementById('todayDate').textContent = `Today: ${dayName} ${dateStr}`;
        }

        // Setup dropdowns
        function setupDropdowns() {
            const leftSelect = document.getElementById('leftCitySelect');
            const rightSelect = document.getElementById('rightCitySelect');

            // Czech cities on left (with Czechia average)
            leftSelect.innerHTML = czechCities.map(city => 
                `<option value="${city}" ${city === leftCity ? 'selected' : ''}>${city}</option>`
            ).join('');

            // Other cities on right
            rightSelect.innerHTML = otherCities.map(city => 
                `<option value="${city}" ${city === rightCity ? 'selected' : ''}>${city}</option>`
            ).join('');

            leftSelect.addEventListener('change', (e) => {
                leftCity = e.target.value;
                loadWeatherData('left', leftCity);
            });

            rightSelect.addEventListener('change', (e) => {
                rightCity = e.target.value;
                loadWeatherData('right', rightCity);
            });
        }

        // Calculate average of multiple city data
        function calculateCzechiaAverage(citiesData) {
            const result = {
                twoDaysAgo: { date: citiesData[0].twoDaysAgo.date, temps: [] },
                yesterday: { date: citiesData[0].yesterday.date, temps: [] },
                today: { date: citiesData[0].today.date, temps: [] },
                todayForecast: { date: citiesData[0].today.date, temps: [] },
                tomorrow: { date: citiesData[0].tomorrow.date, temps: [] },
                dayAfterTomorrow: { date: citiesData[0].dayAfterTomorrow.date, temps: [] },
                pastDaysAvg: { date: 'avg', temps: [] },
                updatedAt: citiesData[0].updatedAt
            };

            // Calculate average for each hour
            for (let hour = 0; hour < 24; hour++) {
                ['twoDaysAgo', 'yesterday', 'today', 'todayForecast', 'tomorrow', 'dayAfterTomorrow', 'pastDaysAvg'].forEach(day => {
                    let sum = 0;
                    let count = 0;
                    citiesData.forEach(cityData => {
                        if (cityData[day] && cityData[day].temps[hour] !== null) {
                            sum += cityData[day].temps[hour];
                            count++;
                        }
                    });
                    result[day].temps[hour] = count > 0 ? sum / count : null;
                });
            }

            return result;
        }

        // Fetch a city's weather data (handles the Czechia average + caching).
        // Shared by the graphs and the table so they always agree.
        async function fetchCityData(cityName) {
            if (cityName === 'Czechia') {
                const citiesData = await Promise.all(
                    czechCitiesForAverage.map(async (city) => {
                        if (cityDataCache[city]) return cityDataCache[city];
                        const res = await fetch(`/api/weather/${encodeURIComponent(city)}`);
                        const cityData = await res.json();
                        cityDataCache[city] = cityData;
                        return cityData;
                    })
                );
                return calculateCzechiaAverage(citiesData);
            }
            if (cityDataCache[cityName]) return cityDataCache[cityName];
            const res = await fetch(`/api/weather/${encodeURIComponent(cityName)}`);
            const data = await res.json();
            cityDataCache[cityName] = data;
            return data;
        }

        // Load weather data for a chart
        async function loadWeatherData(side, cityName) {
            try {
                const data = await fetchCityData(cityName);
                renderChart(side, cityName, data);
                updateStatus(data.updatedAt);
                loadVerification(side, cityName); // runs in the background
            } catch (err) {
                console.error(`Error loading weather data for ${cityName}:`, err);
            }
        }

        // ---- Data verification badge --------------------------------------

        function badgeEls(side) {
            const map = {
                left:  ['leftVerify', 'leftVerifyDetails'],
                right: ['rightVerify', 'rightVerifyDetails'],
                table: ['tableVerify', 'tableVerifyDetails'],
            };
            const [b, d] = map[side];
            return { badge: document.getElementById(b), details: document.getElementById(d) };
        }

        function setBadge(side, state, text, detailsHtml, titleText) {
            const { badge, details } = badgeEls(side);
            if (!badge) return;
            badge.className = `verify-badge ${state}`;
            badge.textContent = text;
            badge.title = titleText || '';
            if (details) {
                details.innerHTML = detailsHtml || '';
                details.classList.remove('show');
            }
        }

        function toggleDetails(side) {
            const { details } = badgeEls(side);
            if (details && details.innerHTML.trim()) details.classList.toggle('show');
        }

        // Ask the server to verify a city's data, then update its badge.
        async function loadVerification(side, cityName) {
            setBadge(side, 'checking', '⏳ Checking data…', '', '');
            try {
                let results;
                if (cityName === 'Czechia') {
                    results = await Promise.all(czechCitiesForAverage.map(c =>
                        fetch(`/api/verify/${encodeURIComponent(c)}`).then(r => r.json())));
                } else {
                    results = [await fetch(`/api/verify/${encodeURIComponent(cityName)}`).then(r => r.json())];
                }

                const valid = results.filter(r => r && Array.isArray(r.checks));
                if (!valid.length) {
                    setBadge(side, 'error', 'Check unavailable', '', 'Could not verify data right now');
                    return;
                }

                const anyWarn = valid.some(r => r.status === 'warning');

                let html = '';
                valid.forEach(r => {
                    if (valid.length > 1) {
                        html += `<div class="vd-row" style="color:#cfd8e3;font-weight:600;margin-top:6px;">${r.city}</div>`;
                    }
                    (r.checks || []).forEach(c => {
                        const cls = c.skipped ? 'vd-skip' : (c.pass ? 'vd-pass' : 'vd-fail');
                        const icon = c.skipped ? '–' : (c.pass ? '✓' : '⚠');
                        html += `<div class="vd-row ${cls}">${icon} ${c.name}: ${c.detail}</div>`;
                    });
                });
                const when = valid[0].checkedAt ? new Date(valid[0].checkedAt).toLocaleString() : '';
                html += `<div class="vd-row vd-skip" style="margin-top:6px;">Checked ${when}. Click the badge to hide.</div>`;

                const label = anyWarn ? '⚠ Check flagged issues' : '✓ Data checked';
                const title = anyWarn
                    ? 'Some checks need attention — click for details'
                    : 'All data checks passed — click for details';
                setBadge(side, anyWarn ? 'warning' : 'ok', label, html, title);
            } catch (e) {
                console.error('Verification failed:', e);
                setBadge(side, 'error', 'Check unavailable', '', 'Could not verify data right now');
            }
        }

        // ---- Table view ---------------------------------------------------

        const tableCities = ['Czechia', ...czechCitiesForAverage, ...otherCities];
        let tableCity = 'Czechia';
        const TABLE_HOURS = [0, 4, 8, 12, 16, 20];

        function fmtTemp(v) {
            return (v === null || v === undefined || Number.isNaN(v)) ? '—' : `${v.toFixed(1)}°`;
        }

        function setupTable() {
            const sel = document.getElementById('tableCitySelect');
            sel.innerHTML = tableCities.map(c =>
                `<option value="${c}" ${c === tableCity ? 'selected' : ''}>${c === 'Czechia' ? 'Czechia (Avg)' : c}</option>`
            ).join('');
            sel.addEventListener('change', (e) => {
                tableCity = e.target.value;
                loadTable();
            });
        }

        function renderTable(cityName, data) {
            const series = [
                { key: 'pastDaysAvg',      label: 'Past Avg (3–7d)' },
                { key: 'twoDaysAgo',       label: '2 Days Ago' },
                { key: 'yesterday',        label: 'Yesterday' },
                { key: 'today',            label: 'Today', highlight: true },
                { key: 'todayForecast',    label: 'Today Forecast' },
                { key: 'tomorrow',         label: 'Tomorrow' },
                { key: 'dayAfterTomorrow', label: 'Day After' },
            ];
            const displayName = cityName === 'Czechia' ? 'Czechia (Average)' : cityName;

            let html = `<table class="data-table"><caption>Temperatures in ${displayName} — every 4 hours (°C, CET/CEST)</caption>`;
            html += `<thead><tr><th class="time-col">Time</th>`;
            series.forEach(s => {
                const d = (data[s.key] && data[s.key].date && data[s.key].date !== 'avg')
                    ? `<br><span style="font-weight:400;color:#7a8a9a;font-size:0.7rem;">${data[s.key].date}</span>` : '';
                html += `<th>${s.label}${d}</th>`;
            });
            html += `</tr></thead><tbody>`;

            TABLE_HOURS.forEach(h => {
                html += `<tr><td class="time-col">${String(h).padStart(2, '0')}:00</td>`;
                series.forEach(s => {
                    const arr = (data[s.key] && data[s.key].temps) ? data[s.key].temps : [];
                    const v = arr[h];
                    const na = (v === null || v === undefined);
                    const cls = `${s.highlight ? 'today-col' : ''}${na ? ' na' : ''}`.trim();
                    html += `<td class="${cls}">${fmtTemp(v)}</td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('tableContainer').innerHTML = html;
        }

        async function loadTable() {
            try {
                const data = await fetchCityData(tableCity);
                renderTable(tableCity, data);
                updateStatus(data.updatedAt);
                loadVerification('table', tableCity);
            } catch (e) {
                console.error('Error loading table:', e);
                document.getElementById('tableContainer').innerHTML =
                    '<div class="error">Could not load table data.</div>';
            }
        }

        // ---- Preparation (CZ / HU) ----------------------------------------

        const PREP_CONFIG = {
            CZ: { capital: 'Prague',   container: 'czPrepContainer', legend: 'czPrepLegend' },
            HU: { capital: 'Budapest', container: 'huPrepContainer', legend: 'huPrepLegend' },
        };

        // Hover explanations for each category (shown as native tooltips).
        const PREP_TIPS = {
            temp:      'Air temperature at this hour, in °C.',
            tempNight: 'Air temperature around midnight, in °C.',
            pressure:  'Air pressure near midday — Low / Normal / High (hPa). Falling pressure often signals more unsettled weather.',
            wind:      'Strength of the strongest wind gusts that day — Light / Normal / Strong (km/h).',
            weather:   'Overall sky condition for the day, from the Open-Meteo weather code (clear, cloudy, rain, storm…).',
            clouds:    'Average cloud cover over the day — None to Very high (% of sky covered). Fewer clouds means more solar.',
            solar:     'Total solar energy reaching the ground that day (shortwave radiation, MJ/m²). It drives photovoltaic (FVE) output: higher = more generation. About 25 is a sunny summer day; a few means dull or overcast.',
            note:      'Automatic flags from the data — big temperature or cloud swings, storms, strong wind, frost, and so on.',
        };

        // Pick a colour class for a day-over-day change.
        //   goodUp = true  -> an increase is good for solar (FVE)
        //   goodUp = false -> a decrease is good for solar (FVE)
        // Returns '' (no colour) when either value is missing.
        function swingClass(curr, prev, goodUp, t1, t2) {
            if (curr === null || curr === undefined || prev === null || prev === undefined) return '';
            let delta = goodUp ? (curr - prev) : (prev - curr);
            if (delta >= t2) return 'swing-vg';
            if (delta >= t1) return 'swing-g';
            if (delta <= -t2) return 'swing-dr';
            if (delta <= -t1) return 'swing-r';
            return '';
        }

        function prepCell(value, suffix, swingCls) {
            if (value === null || value === undefined || value === '') {
                return '<td class="blank">—</td>';
            }
            return `<td class="${swingCls || ''}">${value}${suffix || ''}</td>`;
        }

        async function loadPreparation(country) {
            const cfg = PREP_CONFIG[country];
            const container = document.getElementById(cfg.container);
            container.innerHTML = '<div style="color:#8fa3b8;padding:10px;">Loading…</div>';
            try {
                const res = await fetch(`/api/preparation/${encodeURIComponent(cfg.capital)}`);
                const data = await res.json();
                if (!data || !Array.isArray(data.days) || !data.days.length) {
                    container.innerHTML = '<div class="error">Could not load preparation data.</div>';
                    return;
                }
                renderPreparation(country, data);
            } catch (e) {
                console.error('Error loading preparation:', e);
                container.innerHTML = '<div class="error">Could not load preparation data.</div>';
            }
        }

        // Full weekday name (e.g. "Thursday") for a "YYYY-MM-DD" date string.
        // Anchored at noon UTC and formatted in UTC so the weekday can never be
        // thrown off by the browser's timezone or a midnight/DST boundary.
        function weekdayName(dateStr) {
            if (!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return '';
            const [y, m, d] = dateStr.split('-').map(Number);
            const dt = new Date(Date.UTC(y, m - 1, d, 12, 0, 0));
            return new Intl.DateTimeFormat('en-US', { timeZone: 'UTC', weekday: 'long' }).format(dt);
        }

        function renderPreparation(country, data) {
            const cfg = PREP_CONFIG[country];
            const days = data.days;
            const round = v => (v === null || v === undefined) ? null : Math.round(v);
            const prevOf = i => (i > 0 ? days[i - 1] : null);

            // Three-line header per day: label / date / weekday name.
            const head = days.map(d => {
                const day = weekdayName(d.date);
                return `<th>${d.label}` +
                       `<span class="col-date">${d.date || ''}</span>` +
                       (day ? `<span class="col-day">${day}</span>` : '') +
                       `</th>`;
            }).join('');

            // Temperature rows — warmer than the previous day shades green
            // (warm days in this region tend to be sunnier -> more FVE).
            function tempRow(label, key, tip) {
                let row = `<th class="row-label" title="${tip || ''}">${label}</th>`;
                days.forEach((d, i) => {
                    const p = prevOf(i);
                    const cls = p ? swingClass(d.temp[key], p.temp[key], true, 2.5, 6) : '';
                    row += prepCell(round(d.temp[key]), '°', cls);
                });
                return `<tr>${row}</tr>`;
            }

            // Plain text rows (no colour).
            function textRow(label, valueFn, tip) {
                let row = `<th class="row-label" title="${tip || ''}">${label}</th>`;
                days.forEach(d => { row += prepCell(valueFn(d), '', ''); });
                return `<tr>${row}</tr>`;
            }

            // Clouds — fewer clouds than the previous day shades green.
            let cloudsRow = `<th class="row-label" title="${PREP_TIPS.clouds}">☁️ Clouds</th>`;
            days.forEach((d, i) => {
                const p = prevOf(i);
                const cls = p ? swingClass(d.clouds.meanPct, p.clouds.meanPct, false, 12, 30) : '';
                cloudsRow += prepCell(d.clouds.class, '', cls);
            });

            // Solar (FVE) — more daily radiation than the previous day shades green.
            let solarRow = `<th class="row-label" title="${PREP_TIPS.solar}">☀️ Solar (FVE)</th>`;
            days.forEach((d, i) => {
                const p = prevOf(i);
                const cls = p ? swingClass(d.solar.radSum, p.solar.radSum, true, 3, 8) : '';
                solarRow += prepCell(round(d.solar.radSum), '', cls);
            });

            // Notes.
            let noteRow = `<th class="row-label" title="${PREP_TIPS.note}">📝 Note</th>`;
            days.forEach(d => {
                const notes = (d.notes || []).slice(0, 3).join('; ');
                noteRow += notes ? `<td class="prep-note">${notes}</td>` : '<td class="blank">—</td>';
            });

            document.getElementById(cfg.container).innerHTML = `
                <table class="prep-table">
                    <caption>${country} (${cfg.capital}) — 5-day overview</caption>
                    <thead><tr><th class="row-label">${country} (${cfg.capital})</th>${head}</tr></thead>
                    <tbody>
                        ${tempRow('🌡️ Temp 8:00', 'h8', PREP_TIPS.temp)}
                        ${tempRow('🌡️ Temp 16:00', 'h16', PREP_TIPS.temp)}
                        ${tempRow('🌡️ Temp 0:00', 'h0', PREP_TIPS.tempNight)}
                        ${textRow('🎚️ Pressure', d => d.pressure.class, PREP_TIPS.pressure)}
                        ${textRow('💨 Wind', d => d.wind.class, PREP_TIPS.wind)}
                        ${textRow('⚡ Weather', d => d.weather.desc, PREP_TIPS.weather)}
                        <tr>${cloudsRow}</tr>
                        <tr>${solarRow}</tr>
                        <tr>${noteRow}</tr>
                    </tbody>
                </table>`;

            const when = data.generatedAt ? new Date(data.generatedAt).toLocaleString() : '';
            document.getElementById(cfg.legend).innerHTML =
                '<strong>Colour = change vs the previous day, for solar (FVE) output.</strong><br>' +
                '<span class="swatch swing-vg"></span> much higher' +
                '<span class="swatch swing-g"></span> higher' +
                '<span class="swatch swing-r"></span> lower' +
                '<span class="swatch swing-dr"></span> much lower' +
                `<div class="note">Source: Open-Meteo for ${cfg.capital} (used as the ${country} proxy). Generated ${when}.</div>`;
        }

        // ---- Tabs ---------------------------------------------------------

        const VIEWS = {
            graphs: { view: 'graphsView', tab: 'tabGraphs' },
            table:  { view: 'tableView',  tab: 'tabTable' },
            czprep: { view: 'czPrepView', tab: 'tabCzPrep' },
            huprep: { view: 'huPrepView', tab: 'tabHuPrep' },
        };

        function showTab(tab) {
            Object.keys(VIEWS).forEach(key => {
                const v = VIEWS[key];
                const active = (key === tab);
                document.getElementById(v.view).style.display = active ? '' : 'none';
                document.getElementById(v.tab).classList.toggle('active', active);
            });
            if (tab === 'table') loadTable();
            if (tab === 'czprep') loadPreparation('CZ');
            if (tab === 'huprep') loadPreparation('HU');
        }

        // Update status bar
        function updateStatus(updatedAt) {
            const lastUpdate = updatedAt 
                ? new Date(updatedAt).toLocaleString() 
                : 'Unknown';
            document.getElementById('statusBar').textContent = 
                `Last updated: ${lastUpdate}`;
        }

        // Refresh data from API
        async function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            btn.textContent = '⏳ Fetching...';
            btn.disabled = true;
            
            // Clear cache
            cityDataCache = {};
            
            try {
                await fetch('/api/fetch', { method: 'POST' });
                await Promise.all([
                    loadWeatherData('left', leftCity),
                    loadWeatherData('right', rightCity)
                ]);
                // Refresh whichever secondary view is currently open.
                if (document.getElementById('tableView').style.display !== 'none') loadTable();
                if (document.getElementById('czPrepView').style.display !== 'none') loadPreparation('CZ');
                if (document.getElementById('huPrepView').style.display !== 'none') loadPreparation('HU');
            } catch (err) {
                console.error('Error refreshing data:', err);
                alert('Error refreshing data. Try again.');
            } finally {
                btn.textContent = '🔄 Refresh All Data';
                btn.disabled = false;
            }
        }

        // Get min/max temps and check if 0°C line should be visible
        function analyzeTemps(data) {
            const allTemps = [
                ...data.twoDaysAgo.temps,
                ...data.yesterday.temps,
                ...data.today.temps,
                ...(data.todayForecast ? data.todayForecast.temps : []),
                ...data.tomorrow.temps,
                ...data.dayAfterTomorrow.temps,
                ...(data.pastDaysAvg ? data.pastDaysAvg.temps : [])
            ].filter(t => t !== null && t !== undefined && !Number.isNaN(t));

            // No usable values yet — bail out instead of letting Math.min/max
            // return Infinity/-Infinity (which would feed bad annotation bounds).
            if (allTemps.length === 0) {
                return { min: null, max: null, showZeroLine: false };
            }

            const min = Math.min(...allTemps);
            const max = Math.max(...allTemps);

            // Show zero line if data crosses or gets close to 0
            const showZeroLine = min < 2 && max > -2;

            return { min, max, showZeroLine };
        }

        // ---- Clickable legends --------------------------------------------
        // The legend under each graph is custom HTML (Chart.js' built-in legend
        // is disabled). Each legend item maps 1:1, by DOM order, to a dataset in
        // renderChart(). Clicking an item shows/hides that line.

        // Which datasets are hidden, per chart side. Kept here — not just inside
        // the chart — so the choice survives a re-render when the user switches
        // city (the chart is destroyed and rebuilt on every city change).
        const hiddenDatasets = { left: new Set(), right: new Set() };

        // Find the .legend-item elements that belong to a given chart side.
        function legendItemsFor(side) {
            const canvasId = side === 'left' ? 'leftChart' : 'rightChart';
            const panel = document.getElementById(canvasId).closest('.chart-panel');
            return panel ? panel.querySelectorAll('.legend-custom .legend-item') : [];
        }

        // Attach click/keyboard handlers to every legend item (runs once).
        function setupLegends() {
            ['left', 'right'].forEach(side => {
                legendItemsFor(side).forEach((item, index) => {
                    item.dataset.ds = index;
                    item.setAttribute('role', 'button');
                    item.setAttribute('tabindex', '0');
                    item.setAttribute('aria-pressed', 'true'); // visible by default
                    item.title = 'Click to show/hide this line';
                    item.addEventListener('click', () => toggleSeries(side, index, item));
                    item.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            toggleSeries(side, index, item);
                        }
                    });
                });
            });
        }

        // Toggle one line on a chart and remember the choice.
        function toggleSeries(side, index, itemEl) {
            const chart = side === 'left' ? leftChart : rightChart;
            if (!chart) return;
            const willHide = chart.isDatasetVisible(index);
            chart.setDatasetVisibility(index, !willHide);
            if (willHide) hiddenDatasets[side].add(index);
            else hiddenDatasets[side].delete(index);
            itemEl.classList.toggle('legend-hidden', willHide);
            itemEl.setAttribute('aria-pressed', String(!willHide));
            chart.update();
        }

        // Re-apply the remembered show/hide state after a chart is (re)built,
        // and sync the legend items' struck-through styling to match.
        function applyLegendState(side) {
            const chart = side === 'left' ? leftChart : rightChart;
            if (!chart) return;
            const hidden = hiddenDatasets[side];
            legendItemsFor(side).forEach((item, i) => {
                const isHidden = hidden.has(i);
                item.classList.toggle('legend-hidden', isHidden);
                item.setAttribute('aria-pressed', String(!isHidden));
            });
            if (hidden.size === 0) return; // nothing hidden -> chart already correct
            chart.data.datasets.forEach((ds, i) => chart.setDatasetVisibility(i, !hidden.has(i)));
            chart.update();
        }

        // Render chart
        function renderChart(side, cityName, data) {
            const canvasId = side === 'left' ? 'leftChart' : 'rightChart';
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            const hours = Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`);
            
            // Destroy existing chart
            if (side === 'left' && leftChart) {
                leftChart.destroy();
            } else if (side === 'right' && rightChart) {
                rightChart.destroy();
            }

            const displayName = cityName === 'Czechia' ? 'Czechia (Average)' : cityName;
            const { min, max, showZeroLine } = analyzeTemps(data);

            // Build annotations
            const annotations = {};
            if (showZeroLine) {
                // Only add cold zone if there are actually negative temps
                if (min < 0) {
                    annotations.coldZone = {
                        type: 'box',
                        yMin: min - 2,  // Dynamic: 2 degrees below lowest temp
                        yMax: 0,
                        backgroundColor: 'rgba(100, 149, 237, 0.1)',
                        borderWidth: 0
                    };
                }
            }

            const newChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: hours,
                    datasets: [
                        {
                            // Past days average (3-7 days ago) - very light red, transparent
                            label: `Past Avg (3-7 days)`,
                            data: data.pastDaysAvg ? data.pastDaysAvg.temps : Array(24).fill(null),
                            borderColor: 'rgba(255, 200, 200, 0.5)',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 3,
                            order: 6,
                        },
                        {
                            // 2 Days Ago - dotted light red
                            label: `2 Days Ago (${data.twoDaysAgo.date})`,
                            data: data.twoDaysAgo.temps,
                            borderColor: '#ff9999',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            borderDash: [2, 4],
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                            order: 5,
                        },
                        {
                            // Yesterday - dashed heavy red (longer dashes)
                            label: `Yesterday (${data.yesterday.date})`,
                            data: data.yesterday.temps,
                            borderColor: '#e94560',
                            backgroundColor: 'transparent',
                            borderWidth: 3,
                            borderDash: [10, 5],
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            order: 4,
                        },
                        {
                            // Today - solid thick green
                            label: `Today (${data.today.date})`,
                            data: data.today.temps,
                            borderColor: '#4ecca3',
                            backgroundColor: 'rgba(78, 204, 163, 0.1)',
                            borderWidth: 5,
                            tension: 0.3,
                            pointRadius: 2,
                            pointHoverRadius: 6,
                            order: 1,
                        },
                        {
                            // Today Forecast - what yesterday predicted for today - cyan/teal dashed
                            label: `Today Forecast`,
                            data: data.todayForecast ? data.todayForecast.temps : Array(24).fill(null),
                            borderColor: '#00CED1',
                            backgroundColor: 'transparent',
                            borderWidth: 3,
                            borderDash: [8, 4],
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            order: 1.5,
                        },
                        {
                            // Tomorrow - dashed light green (longer dashes)
                            label: `Tomorrow (${data.tomorrow.date})`,
                            data: data.tomorrow.temps,
                            borderColor: '#90EE90',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            borderDash: [10, 5],
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                            order: 2,
                        },
                        {
                            // Day After Tomorrow - thin dotted light green
                            label: `Day After (${data.dayAfterTomorrow.date})`,
                            data: data.dayAfterTomorrow.temps,
                            borderColor: '#90EE90',
                            backgroundColor: 'transparent',
                            borderWidth: 1,
                            borderDash: [2, 4],
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 3,
                            order: 3,
                        },
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: false,
                        },
                        tooltip: {
                            backgroundColor: '#16213e',
                            titleColor: '#fff',
                            bodyColor: '#ccc',
                            borderColor: '#0f3460',
                            borderWidth: 1,
                            padding: 16,
                            titleFont: {
                                size: 16,
                                weight: 'bold'
                            },
                            bodyFont: {
                                size: 14
                            },
                            bodySpacing: 8,
                            callbacks: {
                                label: function(context) {
                                    if (context.parsed.y !== null) {
                                        return `${context.dataset.label}: ${context.parsed.y.toFixed(1)}°C`;
                                    }
                                    return null;
                                }
                            }
                        },
                        title: {
                            display: true,
                            text: `Temperature in ${displayName}`,
                            color: '#fff',
                            font: {
                                size: 16,
                                weight: 'bold'
                            },
                            padding: {
                                bottom: 15
                            }
                        },
                        annotation: {
                            annotations: annotations
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)',
                            },
                            ticks: {
                                color: '#888',
                                maxTicksLimit: 8,
                                font: {
                                    size: 10
                                }
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)',
                            },
                            ticks: {
                                color: '#888',
                                font: {
                                    size: 10
                                },
                                callback: function(value) {
                                    return value + '°C';
                                }
                            }
                        }
                    }
                }
            });

            if (side === 'left') {
                leftChart = newChart;
            } else {
                rightChart = newChart;
            }

            // Re-apply any lines the user had toggled off for this side.
            applyLegendState(side);
        }

        // Start the app
        init();
    </script>
</body>
</html>
